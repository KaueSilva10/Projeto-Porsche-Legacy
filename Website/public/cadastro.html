<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/login.css">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Porsche Legacy | Cadastro</title>
</head>
<body>

    <div class="header">
        <div class="navbar">
            <div class="logo">
                <a href="/index.html"><img src="/assets/img/porschelogo.png" alt="" height="40px"></a>
            </div>
            <ul>
                <li><a class="items-navbar" href="/quiz.html">Quiz</a></li>
                <li><a class="items-navbar" href="/modelos.html">Modelos</a></li>
                <li><a class="items-navbar" href="/sobre.html">Sobre</a></li>
                <li style="color: #D1D5DB;">|</li>
                <li id="li_usuario"><a href="/login.html"><button class="login">Login</button></a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <div class="content">
            <h2 class="title">Faça o seu cadastro</h2>
            <div class="campos">
                <div class="inputs-cadastro">
                    <h4>Seu nome completo:</h4>
                    <input type="text" id="ipt_nome" placeholder="Nome Completo" required>
                </div>
                <div class="inputs-cadastro">
                    <h4>Seu email:</h4>
                    <input type="email" id="ipt_email" placeholder="seuemail@.com" required>
                </div>
                <div class="inputs-cadastro">
                    <h4>Digite uma senha válida:</h4>
                    <input type="password" id="ipt_senha" placeholder="******" required>
                </div>
                <div class="inputs-cadastro">
                    <h4>Confirme sua senha:</h4>
                    <input type="password" id="ipt_confirmar" placeholder="******" required>
                </div>
                <div class="btn-cadastrar">
                    <button onclick="cadastrar()">Cadastrar-se</button>
                </div>
                <span class="possui">Já tem uma conta?<a href="/login.html">Login</a></span>
            </div>
        </div>
    </div>
    
    <script src="/assets/js/cadastro.js"></script>
    <script src="/assets/js/script.js"></script>
</body>
</html>
