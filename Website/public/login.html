<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Porsche Legacy | Login</title>
</head>
<body>

    <div class="header">
        <div class="navbar">
            <div class="logo">
                <a href="/index.html"><img src="/assets/img/porschelogo.png" alt="" height="40px"></a>
            </div>
            <ul>
                <li><a class="items-navbar" href="/quiz.html">Quiz</a></li>
                <li><a class="items-navbar" href="/modelos.html">Modelos</a></li>
                <li><a class="items-navbar" href="/sobre.html">Sobre</a></li>
                <li style="color: #D1D5DB;">|</li>
                <li id="li_usuario"><a href="/login.html"><button class="login">Login</button></a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <div class="content">
            <h2 class="title">Faça o seu login</h2>
            <div class="campos">
                <div class="inputs-cadastro">
                    <h4>Seu email:</h4>
                    <input type="email" id="ipt_email" placeholder="seuemail@.com" required>
                </div>
                <div class="inputs-cadastro">
                    <h4>Digite sua senha:</h4>
                    <input type="password" id="ipt_senha" placeholder="******" required>
                </div>
                <div class="btn-cadastrar">
                    <button onclick="entrar()">Login</button>
                </div>
            </div>
            <span class="possui">Não tem uma conta?<a href="/cadastro.html">Cadastrar-se</a></span>
        </div>
    </div>

</body>
</html>

<script>
    function entrar() {

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            alert("Erro ao fazer o login! Preencha todos os campos.");
            return false;
        } 

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idusuario;

                    setTimeout(function () {
                        window.location = "/index.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

</script>
